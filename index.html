<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>TM Conference Check-in</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
:root{--bg:#0d0d0f;--surface:#17171a;--border:#2a2a2f;--text:#f0f0f2;--muted:#6b6b75;--accent:#7b61ff;--green:#00e676;--green-bg:#00291a;--red:#ff4d4d;--red-bg:#2b0a0a;--amber:#ffb800}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.logo span{color:var(--accent)}
#status{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);display:flex;align-items:center;gap:5px}
#status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s}
#status.on::before{background:var(--green)}
#session-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:32px}
.screen-title{text-align:center}
.screen-title h1{font-size:22px;font-weight:600;margin-bottom:6px}
.screen-title p{font-size:14px;color:var(--muted)}
.sessions-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:400px}
.session-btn{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;text-align:left;cursor:pointer;line-height:1.35}
.session-btn:active{transform:scale(.97)}
.day-tag{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.day1 .day-tag{color:#7b61ff}
.day2 .day-tag{color:var(--amber)}
#scanner-screen{flex:1;display:none;flex-direction:column}
.session-bar{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.session-bar .lbl{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em}
.session-bar .nm{font-size:14px;font-weight:600;margin-top:2px}
.change-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--muted);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer}
.camera-wrap{position:relative;flex:1;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center}
#video{width:100%;height:100%;object-fit:cover;display:block}
#canvas{display:none}
.viewfinder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.vf-box{width:220px;height:220px;position:relative}
.vf-box::before,.vf-box::after,.vf-tl::before,.vf-tl::after{content:'';position:absolute;width:28px;height:28px;border-color:rgba(255,255,255,.8);border-style:solid}
.vf-box::before{top:0;left:0;border-width:2px 0 0 2px;border-radius:3px 0 0 0}
.vf-box::after{top:0;right:0;border-width:2px 2px 0 0;border-radius:0 3px 0 0}
.vf-tl::before{bottom:0;left:0;border-width:0 0 2px 2px;border-radius:0 0 0 3px}
.vf-tl::after{bottom:0;right:0;border-width:0 2px 2px 0;border-radius:0 0 3px 0}
.scan-line{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanline 2s ease-in-out infinite;top:4px}
@keyframes scanline{0%{top:4px;opacity:1}45%{top:calc(100% - 6px);opacity:1}50%{opacity:0}55%{top:4px;opacity:0}60%{opacity:1}100%{top:calc(100% - 6px);opacity:1}}
.hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:12px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace}
#result-overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:32px}
#result-overlay.approved{background:var(--green-bg)}
#result-overlay.denied{background:var(--red-bg)}
#result-overlay.unknown{background:#1a1400}
.r-icon{font-size:72px;margin-bottom:16px;animation:pop .3s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.r-status{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.approved .r-status{color:var(--green)}
.denied .r-status{color:var(--red)}
.unknown .r-status{color:var(--amber)}
.r-name{font-size:28px;font-weight:600;text-align:center;margin-bottom:6px}
.r-detail{font-size:14px;color:var(--muted);text-align:center;margin-bottom:32px}
.r-tap{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.08em;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.stats-bar{padding:10px 20px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:20px;flex-shrink:0}
.stat{display:flex;align-items:baseline;gap:5px}
.stat-num{font-family:'DM Mono',monospace;font-size:18px;font-weight:500}
.g{color:var(--green)}.r{color:var(--red)}
.stat-label{font-size:11px;color:var(--muted)}
#manual-wrap{display:none;padding:20px;flex-direction:column;gap:12px}
.manual-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;text-align:center}
.check-btn{background:var(--accent);border:none;border-radius:10px;padding:14px;color:#fff;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%}
#loading-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;max-width:280px}
.load-label{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.load-pct{font-size:36px;font-family:'DM Mono',monospace;font-weight:500;color:var(--text);line-height:1}
.load-track{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.load-fill{height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .4s ease}
</style>
</head>
<body>
<header>
  <div class="logo"><span>TM</span> District Conference</div>
  <div id="status">connecting...</div>
</header>

<div id="session-screen">
  <div id="loading-wrap">
    <div class="load-label">Connecting</div>
    <div class="load-pct" id="load-pct">0%</div>
    <div class="load-track"><div class="load-fill" id="load-fill"></div></div>
  </div>
  <div class="screen-title" id="sessions-title" style="display:none"><h1>Select session</h1><p>Which door are you scanning for?</p></div>
  <div class="sessions-grid" id="sessions-grid" style="display:none"></div>
</div>

<div id="scanner-screen">
  <div class="session-bar">
    <div><div class="lbl">Scanning for</div><div class="nm" id="active-name">—</div></div>
    <button class="change-btn" onclick="showSessions()">Change</button>
  </div>
  <div class="camera-wrap" id="camera-wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="viewfinder"><div class="vf-box"><div class="vf-tl"></div><div class="scan-line"></div></div></div>
    <div class="hint">Hold QR code in frame</div>
  </div>
  <div id="manual-wrap">
    <input type="text" class="manual-input" id="manual-code" placeholder="Type attendee email..." />
    <button class="check-btn" onclick="checkManual()">Check in</button>
  </div>
  <div class="stats-bar">
    <div class="stat"><span class="stat-num g" id="cnt-ok">0</span><span class="stat-label">checked in</span></div>
    <div class="stat"><span class="stat-num r" id="cnt-no">0</span><span class="stat-label">denied</span></div>
    <div class="stat" style="margin-left:auto"><span class="stat-num" id="cnt-tot" style="color:var(--muted)">0</span><span class="stat-label">expected</span></div>
  </div>
</div>

<div id="result-overlay" onclick="dismiss()">
  <div class="r-icon" id="r-icon">✓</div>
  <div class="r-status" id="r-status">APPROVED</div>
  <div class="r-name" id="r-name">Jane Smith</div>
  <div class="r-detail" id="r-detail">Session</div>
  <div class="r-tap">Tap to continue scanning</div>
</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbwUPmOWKmE7yfnthGIrn5L9-g7H-b_XqUWFhGHhrwwKoc6Nlmxd7X-lJLiMVr3tpl3e/exec';
var activeSession = null;
var scanning = false;
var stream = null;
var timer = null;
var cntOk = 0;
var cntNo = 0;
var _video = null;
var _canvas = null;
var _ctx = null;
var _lastTick = 0;
var SCAN_INTERVAL = 50; // ~20fps

var DEFAULTS = [
  {id:'isc', name:'ISC', day:1},
  {id:'gala', name:'Gala Dinner', day:2}
];

window.onload = function() {
  var pct = 0;
  var loadTimer = setInterval(function() {
    pct = Math.min(pct + (Math.random() * 8 + 4), 88);
    setLoadPct(pct);
  }, 200);

  fetch(API + '?action=sessions')
    .then(function(r){ return r.json(); })
    .then(function(d){
      clearInterval(loadTimer);
      setLoadPct(100);
      setTimeout(function(){
        renderSessions(d.sessions && d.sessions.length ? d.sessions : DEFAULTS);
        setStatus(true);
      }, 300);
    })
    .catch(function(){
      clearInterval(loadTimer);
      setLoadPct(100);
      setTimeout(function(){
        renderSessions(DEFAULTS);
        setStatus(false);
      }, 300);
    });
};

function setLoadPct(p) {
  p = Math.round(p);
  document.getElementById('load-fill').style.width = p + '%';
  document.getElementById('load-pct').textContent = p + '%';
}

function renderSessions(list) {
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var s = list[i];
    var safe = s.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += '<button class="session-btn day'+s.day+'" onclick="pick(\''+safe+'\')">';
    html += '<div class="day-tag">Day '+s.day+'</div>'+s.name+'</button>';
  }
  var grid = document.getElementById('sessions-grid');
  grid.innerHTML = html;
  document.getElementById('loading-wrap').style.display = 'none';
  document.getElementById('sessions-title').style.display = '';
  grid.style.display = '';
}

function pick(name) {
  activeSession = name;
  cntOk = 0; cntNo = 0;
  document.getElementById('active-name').textContent = name;
  document.getElementById('cnt-ok').textContent = '0';
  document.getElementById('cnt-no').textContent = '0';
  document.getElementById('session-screen').style.display = 'none';
  document.getElementById('scanner-screen').style.display = 'flex';
  startCam();
  fetch(API + '?action=count&session=' + encodeURIComponent(name))
    .then(function(r){ return r.json(); })
    .then(function(d){ if(d.total !== undefined) document.getElementById('cnt-tot').textContent = d.total; })
    .catch(function(){});
}

function showSessions() {
  stopCam();
  document.getElementById('scanner-screen').style.display = 'none';
  document.getElementById('session-screen').style.display = 'flex';
}

function startCam() {
  _video = document.getElementById('video');
  _canvas = document.getElementById('canvas');
  _ctx = _canvas.getContext('2d');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}})
    .then(function(s){
      stream = s;
      _video.srcObject = s;
      _video.play();
      _video.onloadedmetadata = function(){ scanning = true; requestAnimationFrame(tick); };
      document.getElementById('camera-wrap').style.display = 'flex';
      document.getElementById('manual-wrap').style.display = 'none';
    })
    .catch(function(){
      document.getElementById('camera-wrap').style.display = 'none';
      document.getElementById('manual-wrap').style.display = 'flex';
    });
}

function stopCam() {
  scanning = false;
  if (stream) { stream.getTracks().forEach(function(t){t.stop();}); stream = null; }
}

function tick(ts) {
  if (!scanning) return;
  if (_video.readyState !== _video.HAVE_ENOUGH_DATA) { requestAnimationFrame(tick); return; }
  if (ts - _lastTick < SCAN_INTERVAL) { requestAnimationFrame(tick); return; }
  _lastTick = ts;
  var sw = _video.videoWidth, sh = _video.videoHeight;
  var scale = Math.min(1, 1024 / Math.max(sw, sh));
  var w = Math.round(sw * scale), h = Math.round(sh * scale);
  if (_canvas.width !== w) _canvas.width = w;
  if (_canvas.height !== h) _canvas.height = h;
  _ctx.drawImage(_video, 0, 0, w, h);
  var img = _ctx.getImageData(0, 0, w, h);
  var code = jsQR(img.data, w, h, {inversionAttempts:'attemptBoth'});
  if (code && code.data) { scanning = false; lookup(code.data); }
  else { requestAnimationFrame(tick); }
}

function lookup(code) {
  fetch(API + '?action=checkin&code=' + encodeURIComponent(code) + '&session=' + encodeURIComponent(activeSession))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.status === 'approved') {
        cntOk++; document.getElementById('cnt-ok').textContent = cntOk;
        show('approved','✓',d.name, d.detail || activeSession);
      } else if (d.status === 'already') {
        show('unknown','⚠', d.name || 'Already checked in', 'Scanned at ' + (d.time||'earlier'));
      } else {
        cntNo++; document.getElementById('cnt-no').textContent = cntNo;
        show('denied','✗', d.name || 'Not registered', d.reason || 'No ticket for this session');
      }
    })
    .catch(function(){ show('unknown','!','Connection error','Could not reach Google Sheet'); });
}

function checkManual() {
  var v = document.getElementById('manual-code').value.trim();
  if (v) { lookup(v); document.getElementById('manual-code').value = ''; }
}

function show(type, icon, name, detail) {
  var o = document.getElementById('result-overlay');
  o.className = type; o.style.display = 'flex';
  document.getElementById('r-icon').textContent = icon;
  document.getElementById('r-status').textContent = type==='approved'?'APPROVED':type==='denied'?'DENIED':'NOTE';
  document.getElementById('r-name').textContent = name;
  document.getElementById('r-detail').textContent = detail;
  if (navigator.vibrate) navigator.vibrate(type==='approved'?[80]:[80,60,80]);
  clearTimeout(timer);
  timer = setTimeout(dismiss, 4000);
}

function dismiss() {
  clearTimeout(timer);
  document.getElementById('result-overlay').style.display = 'none';
  scanning = true;
  requestAnimationFrame(tick);
}

function setStatus(on) {
  var el = document.getElementById('status');
  el.textContent = on ? 'connected' : 'offline';
  el.className = on ? 'on' : '';
}
</script>
</body>
</html>
